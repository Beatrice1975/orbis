<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Orbis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  #app {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    width: 100dvw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    z-index: 1;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .title {
    color: #fff;
    font-size: 2.5rem;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
  }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 280px;
  }

  .btn {
    display: block;
    padding: 14px 40px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 50px;
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 1.05rem;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
    transition: all 0.4s ease;
    backdrop-filter: blur(10px);
    -webkit-tap-highlight-color: transparent;
  }

  .btn-aura {
    border-color: rgba(255, 100, 200, 0.3);
    box-shadow: 0 0 30px rgba(255, 100, 200, 0.1);
  }
  .btn-aura:hover, .btn-aura:active {
    background: rgba(255, 100, 200, 0.15);
    border-color: rgba(255, 100, 200, 0.6);
    box-shadow: 0 0 40px rgba(255, 100, 200, 0.3);
    transform: translateY(-2px);
  }

  .btn-tempesta {
    border-color: rgba(100, 180, 255, 0.3);
    box-shadow: 0 0 30px rgba(100, 180, 255, 0.1);
  }
  .btn-tempesta:hover, .btn-tempesta:active {
    background: rgba(100, 180, 255, 0.15);
    border-color: rgba(100, 180, 255, 0.6);
    box-shadow: 0 0 40px rgba(100, 180, 255, 0.3);
    transform: translateY(-2px);
  }

  .btn-ignis {
    border-color: rgba(255, 120, 30, 0.3);
    box-shadow: 0 0 30px rgba(255, 120, 30, 0.1);
  }
  .btn-ignis:hover, .btn-ignis:active {
    background: rgba(255, 120, 30, 0.15);
    border-color: rgba(255, 120, 30, 0.6);
    box-shadow: 0 0 40px rgba(255, 120, 30, 0.3);
    transform: translateY(-2px);
  }

  .btn-mare {
    border-color: rgba(0, 200, 220, 0.3);
    box-shadow: 0 0 30px rgba(0, 200, 220, 0.1);
  }
  .btn-mare:hover, .btn-mare:active {
    background: rgba(0, 200, 220, 0.15);
    border-color: rgba(0, 200, 220, 0.6);
    box-shadow: 0 0 40px rgba(0, 200, 220, 0.3);
    transform: translateY(-2px);
  }

  .btn-astro {
    border-color: rgba(140, 100, 220, 0.3);
    box-shadow: 0 0 30px rgba(140, 100, 220, 0.1);
  }
  .btn-astro:hover, .btn-astro:active {
    background: rgba(140, 100, 220, 0.15);
    border-color: rgba(140, 100, 220, 0.6);
    box-shadow: 0 0 40px rgba(140, 100, 220, 0.3);
    transform: translateY(-2px);
  }

  .subtitle {
    color: rgba(255,255,255,0.4);
    font-size: 0.85rem;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .bg-glow {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,100,150,0.1) 0%, transparent 70%);
    animation: pulse 4s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
  }

  .exit-btn {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom));
    right: max(20px, env(safe-area-inset-right));
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5);
    font-size: 1.2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    z-index: 100;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .exit-btn:hover, .exit-btn:active {
    background: rgba(255,80,80,0.3);
    border-color: rgba(255,80,80,0.6);
    color: #fff;
    transform: scale(1.1);
  }

  /* Fullscreen prompt overlay */
  #fsPrompt {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    gap: 30px;
    padding: 20px;
    text-align: center;
  }
  #fsPrompt.hidden {
    display: none;
  }
  #fsPrompt h2 {
    color: #fff;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
  }
  #fsBtn {
    padding: 16px 56px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }
  #fsBtn:hover, #fsBtn:active {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.6);
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
    transform: scale(1.05);
  }
</style>
<base target="_blank">
<base target="_blank">
</head>
<body>
  <div class="bg-glow"></div>

  <div id="app">
    <div class="container">
      <h1 class="title">Orbis</h1>
      <div class="buttons">
        <a href="Aura.html" class="btn btn-aura">Aura</a>
        <a href="Tempesta.html" class="btn btn-tempesta">Tempesta</a>
        <a href="Ignis.html" class="btn btn-ignis">Ignis</a>
        <a href="Mare.html" class="btn btn-mare">Mare</a>
        <a href="Astro.html" class="btn btn-astro">Astro</a>
      </div>
      <p class="subtitle">Chose your orbis</p>
    </div>
  </div>

  <button class="exit-btn" id="exitBtn" title="Esci">&#10005;</button>

  <!-- Fullscreen prompt -->
  <div id="fsPrompt">
    <h2>Orbis</h2>
    <button id="fsBtn">Enter</button>
  </div>

  <script>
    const fsPrompt = document.getElementById('fsPrompt');
    const fsBtn = document.getElementById('fsBtn');

    function enterFullscreen() {
      const el = document.documentElement;
      let promise = null;
      if (el.requestFullscreen) {
        promise = el.requestFullscreen();
      } else if (el.webkitRequestFullscreen) {
        promise = el.webkitRequestFullscreen();
      } else if (el.msRequestFullscreen) {
        promise = el.msRequestFullscreen();
      }
      if (promise && promise.then) {
        promise.then(() => {
          fsPrompt.classList.add('hidden');
        }).catch(() => {
          fsPrompt.classList.add('hidden');
          window.scrollTo(0, 1);
        });
      } else {
        fsPrompt.classList.add('hidden');
        window.scrollTo(0, 1);
      }
    }

    fsBtn.addEventListener('click', enterFullscreen);
    fsBtn.addEventListener('touchend', function(e) {
      e.preventDefault();
      enterFullscreen();
    });

    function checkFullscreen() {
      if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
        fsPrompt.classList.add('hidden');
      }
    }
    document.addEventListener('fullscreenchange', checkFullscreen);
    document.addEventListener('webkitfullscreenchange', checkFullscreen);

    window.addEventListener('load', function() {
      setTimeout(function() {
        window.scrollTo(0, 1);
      }, 100);
    });

    // Prevent screen sleep
    function preventSleep() {
      if ('wakeLock' in navigator) {
        let wakeLock = null;
        const requestWakeLock = async () => {
          try {
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => {
              requestWakeLock();
            });
          } catch (err) {}
        };
        requestWakeLock();
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') requestWakeLock();
        });
      }
      const video = document.createElement('video');
      video.src = 'data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAACKBtZGF0AAAC';
      video.loop = true;
      video.muted = true;
      video.playsInline = true;
      video.style.position = 'fixed';
      video.style.width = '1px';
      video.style.height = '1px';
      video.style.opacity = '0';
      video.style.pointerEvents = 'none';
      document.body.appendChild(video);
      video.play().catch(() => {});
    }
    preventSleep();

    // Exit button
    document.getElementById('exitBtn').addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
      } else if (document.webkitFullscreenElement) {
        document.webkitExitFullscreen();
      }
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'about:blank';
      }
    });
    document.getElementById('exitBtn').addEventListener('touchend', function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
      } else if (document.webkitFullscreenElement) {
        document.webkitExitFullscreen();
      }
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'about:blank';
      }
    });
  </script>
</body>
</html>
