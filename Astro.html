<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Orbis - Astro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
  canvas { display: block; }
</style>
<base target="_blank">
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const DURATION = 30;
  let startTime = null;

  function getTime() {
    if (!startTime) startTime = performance.now();
    return ((performance.now() - startTime) / 1000) % DURATION;
  }

  // ========== PALETTE GALASSIA ==========
  const palettes = [
    { name: 'blu',     r0: 5,   g0: 10,  b0: 40,  r1: 3,   g1: 5,   b1: 25,  r2: 2,   g2: 2,   b2: 15,  spiralR: 100, spiralG: 120, spiralB: 200, starWarm: {r:180,g:210,b:255}, starCool: {r:150,g:180,b:255} },
    { name: 'viola',   r0: 15,  g0: 5,   b0: 35,  r1: 8,   g1: 3,   b1: 20,  r2: 4,   g2: 2,   b2: 12,  spiralR: 160, spiralG: 100, spiralB: 220, starWarm: {r:220,g:180,b:255}, starCool: {r:200,g:150,b:255} },
    { name: 'porpora', r0: 25,  g0: 5,   b0: 30,  r1: 15,  g1: 3,   b1: 18,  r2: 8,   g2: 2,   b2: 10,  spiralR: 200, spiralG: 80,  spiralB: 180, starWarm: {r:255,g:200,b:220}, starCool: {r:255,g:150,b:200} },
  ];

  function getPalette(t) {
    const cycle = (t / DURATION) * 3;
    const idx = Math.floor(cycle) % 3;
    const nextIdx = (idx + 1) % 3;
    const progress = cycle - Math.floor(cycle);
    const smooth = 0.5 - 0.5 * Math.cos(progress * Math.PI);
    const p1 = palettes[idx];
    const p2 = palettes[nextIdx];
    return {
      r0: p1.r0 + (p2.r0 - p1.r0) * smooth, g0: p1.g0 + (p2.g0 - p1.g0) * smooth, b0: p1.b0 + (p2.b0 - p1.b0) * smooth,
      r1: p1.r1 + (p2.r1 - p1.r1) * smooth, g1: p1.g1 + (p2.g1 - p1.g1) * smooth, b1: p1.b1 + (p2.b1 - p1.b1) * smooth,
      r2: p1.r2 + (p2.r2 - p1.r2) * smooth, g2: p1.g2 + (p2.g2 - p1.g2) * smooth, b2: p1.b2 + (p2.b2 - p1.b2) * smooth,
      spiralR: p1.spiralR + (p2.spiralR - p1.spiralR) * smooth, spiralG: p1.spiralG + (p2.spiralG - p1.spiralG) * smooth, spiralB: p1.spiralB + (p2.spiralB - p1.spiralB) * smooth,
      starWarmR: p1.starWarm.r + (p2.starWarm.r - p1.starWarm.r) * smooth, starWarmG: p1.starWarm.g + (p2.starWarm.g - p1.starWarm.g) * smooth, starWarmB: p1.starWarm.b + (p2.starWarm.b - p1.starWarm.b) * smooth,
      starCoolR: p1.starCool.r + (p2.starCool.r - p1.starCool.r) * smooth, starCoolG: p1.starCool.g + (p2.starCool.g - p1.starCool.g) * smooth, starCoolB: p1.starCool.b + (p2.starCool.b - p1.starCool.b) * smooth,
    };
  }

  // ========== STELLE ==========
  const starCount = 300;
  const stars = [];
  for (let i = 0; i < starCount; i++) {
    const r = Math.pow(Math.random(), 0.5);
    const angle = Math.random() * Math.PI * 2;
    const twinkleCycles = 1 + Math.floor(Math.random() * 4);
    stars.push({
      baseR: r, baseAngle: angle, size: 0.5 + Math.random() * 2.5, brightness: 0.3 + Math.random() * 0.7,
      twinkleCycles: twinkleCycles, twinklePhase: Math.random() * Math.PI * 2,
      color: Math.random() > 0.7 ? 'warm' : (Math.random() > 0.5 ? 'cool' : 'white'),
      trembleSpeed: 8 + Math.random() * 15, tremblePhase: Math.random() * Math.PI * 2,
    });
  }

  // ========== SPIRALE GALATTICA ==========
  const spiralArms = 3;
  const spiralPoints = 200;
  const spirals = [];
  for (let arm = 0; arm < spiralArms; arm++) {
    for (let i = 0; i < spiralPoints; i++) {
      const t2 = i / spiralPoints;
      const angle = arm * (Math.PI * 2 / spiralArms) + t2 * Math.PI * 4;
      const r = t2 * 0.95;
      const pulseCycles = 1 + Math.floor(Math.random() * 3);
      spirals.push({ arm: arm, t: t2, baseAngle: angle, baseR: r, size: 1 + (1 - t2) * 3, brightness: 0.2 + (1 - t2) * 0.6, pulseCycles: pulseCycles, pulsePhase: Math.random() * Math.PI * 2 });
    }
  }

  // ========== NEBULOSA ==========
  const nebulaCount = 80;
  const nebulas = [];
  for (let i = 0; i < nebulaCount; i++) {
    const r = Math.pow(Math.random(), 0.6);
    const angle = Math.random() * Math.PI * 2;
    const driftCycles = 1 + Math.floor(Math.random() * 2);
    nebulas.push({ baseR: r, baseAngle: angle, size: 5 + Math.random() * 20, alpha: 0.03 + Math.random() * 0.08, driftCycles: driftCycles, driftPhase: Math.random() * Math.PI * 2, hue: 260 + Math.random() * 60 });
  }

  // ========== PIANETI (orbita: cicli interi in 30 secondi) ==========
  // Ogni pianeta completa N giri interi in 30 secondi
  const planets = [
    { r: 0.15, baseAngle: 0.5, size: 4, color: {r: 200, g: 150, b: 100}, glow: 8, orbitCycles: 1 },
    { r: 0.35, baseAngle: 2.8, size: 3, color: {r: 100, g: 180, b: 220}, glow: 6, orbitCycles: 2 },
    { r: 0.55, baseAngle: 4.5, size: 2.5, color: {r: 220, g: 120, b: 80}, glow: 5, orbitCycles: 1 },
  ];

  function draw() {
    const t = getTime();
    const w = canvas.width;
    const h = canvas.height;
    const cx = w / 2;
    const cy = h / 2;
    const R = Math.min(w, h) * 0.42;
    const pal = getPalette(t);

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.clip();

    // Sfondo
    const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
    bg.addColorStop(0, `rgba(${Math.floor(pal.r0)}, ${Math.floor(pal.g0)}, ${Math.floor(pal.b0)}, 0.95)`);
    bg.addColorStop(0.2, `rgba(${Math.floor(pal.r0*0.9+pal.r1*0.1)}, ${Math.floor(pal.g0*0.9+pal.g1*0.1)}, ${Math.floor(pal.b0*0.9+pal.b1*0.1)}, 0.9)`);
    bg.addColorStop(0.5, `rgba(${Math.floor(pal.r1)}, ${Math.floor(pal.g1)}, ${Math.floor(pal.b1)}, 0.85)`);
    bg.addColorStop(0.8, `rgba(${Math.floor(pal.r1*0.7+pal.r2*0.3)}, ${Math.floor(pal.g1*0.7+pal.g2*0.3)}, ${Math.floor(pal.b1*0.7+pal.b2*0.3)}, 0.9)`);
    bg.addColorStop(1, `rgba(${Math.floor(pal.r2)}, ${Math.floor(pal.g2)}, ${Math.floor(pal.b2)}, 0.95)`);
    ctx.fillStyle = bg;
    ctx.fillRect(cx - R, cy - R, R * 2, R * 2);

    // Nebulosa
    nebulas.forEach(neb => {
      const driftPhase = (t / DURATION) * neb.driftCycles * Math.PI * 2 + neb.driftPhase;
      const driftAngle = neb.baseAngle + Math.sin(driftPhase) * 0.2;
      const nx = cx + Math.cos(driftAngle) * neb.baseR * R;
      const ny = cy + Math.sin(driftAngle) * neb.baseR * R;
      const grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, neb.size);
      grad.addColorStop(0, `hsla(${neb.hue}, 60%, 50%, ${neb.alpha})`);
      grad.addColorStop(0.5, `hsla(${neb.hue}, 50%, 40%, ${neb.alpha * 0.5})`);
      grad.addColorStop(1, `hsla(${neb.hue}, 40%, 30%, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(nx, ny, neb.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Spirale (rotazione 120° in 30s = simmetria 3 bracci)
    const rotation = (t / DURATION) * (Math.PI * 2 / 3);

    spirals.forEach(sp => {
      const angle = sp.baseAngle + rotation;
      const r = sp.baseR * R;
      const sx = cx + Math.cos(angle) * r;
      const sy = cy + Math.sin(angle) * r;
      const pulsePhase = (t / DURATION) * sp.pulseCycles * Math.PI * 2 + sp.pulsePhase;
      const pulse = 0.5 + 0.5 * Math.sin(pulsePhase);
      const alpha = sp.brightness * pulse;
      const sz = sp.size * (0.7 + 0.3 * pulse);
      const distFromCenter = 1 - sp.t;
      const sr = Math.floor(pal.spiralR * distFromCenter + pal.r1 * (1 - distFromCenter) * 0.5);
      const sg = Math.floor(pal.spiralG * distFromCenter + pal.g1 * (1 - distFromCenter) * 0.5);
      const sb = Math.floor(pal.spiralB * distFromCenter + pal.b1 * (1 - distFromCenter) * 0.5);
      ctx.fillStyle = `rgba(${sr}, ${sg}, ${sb}, ${alpha})`;
      ctx.beginPath();
      ctx.arc(sx, sy, sz, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowColor = `rgba(${sr}, ${sg}, ${sb}, ${alpha * 0.5})`;
      ctx.shadowBlur = sz * 2;
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    // Linee spirale
    ctx.strokeStyle = `rgba(${Math.floor(pal.spiralR*0.6)}, ${Math.floor(pal.spiralG*0.5)}, ${Math.floor(pal.spiralB*0.7)}, 0.08)`;
    ctx.lineWidth = 1;
    for (let arm = 0; arm < spiralArms; arm++) {
      ctx.beginPath();
      for (let i = 0; i <= spiralPoints; i++) {
        const t2 = i / spiralPoints;
        const angle = arm * (Math.PI * 2 / spiralArms) + t2 * Math.PI * 4 + rotation;
        const r = t2 * 0.95 * R;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // Stelle
    stars.forEach(star => {
      const sx = cx + Math.cos(star.baseAngle) * star.baseR * R;
      const sy = cy + Math.sin(star.baseAngle) * star.baseR * R;
      const twinklePhase = (t / DURATION) * star.twinkleCycles * Math.PI * 2 + star.twinklePhase;
      const twinkle = 0.5 + 0.5 * Math.sin(twinklePhase);
      const tremble = 0.85 + 0.15 * Math.sin(t * star.trembleSpeed + star.tremblePhase);
      const alpha = star.brightness * twinkle * tremble;
      const sz = star.size * (0.6 + 0.4 * twinkle) * tremble;
      let sr, sg, sb;
      if (star.color === 'warm') { sr = Math.floor(pal.starWarmR); sg = Math.floor(pal.starWarmG); sb = Math.floor(pal.starWarmB); }
      else if (star.color === 'cool') { sr = Math.floor(pal.starCoolR); sg = Math.floor(pal.starCoolG); sb = Math.floor(pal.starCoolB); }
      else { sr = 240; sg = 245; sb = 255; }
      ctx.fillStyle = `rgba(${sr}, ${sg}, ${sb}, ${alpha})`;
      ctx.beginPath();
      ctx.arc(sx, sy, sz * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgba(${sr}, ${sg}, ${sb}, ${alpha * 0.3})`;
      ctx.beginPath();
      ctx.arc(sx, sy, sz, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowColor = `rgba(${sr}, ${sg}, ${sb}, ${alpha * 0.4})`;
      ctx.shadowBlur = sz * 3;
      ctx.fill();
      ctx.shadowBlur = 0;
      if (star.size > 1.8 && alpha > 0.6) {
        const rayLen = sz * 4;
        ctx.strokeStyle = `rgba(${sr}, ${sg}, ${sb}, ${alpha * 0.2})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(sx - rayLen, sy); ctx.lineTo(sx + rayLen, sy);
        ctx.moveTo(sx, sy - rayLen); ctx.lineTo(sx, sy + rayLen);
        ctx.stroke();
      }
    });

    // ========== PIANETI (orbita perfetta) ==========
    planets.forEach(planet => {
      // Orbita: N giri interi in 30 secondi
      const orbitPhase = (t / DURATION) * planet.orbitCycles * Math.PI * 2;
      const angle = planet.baseAngle + orbitPhase;
      const r = planet.r * R;
      const px = cx + Math.cos(angle) * r;
      const py = cy + Math.sin(angle) * r;

      const glowGrad = ctx.createRadialGradient(px, py, 0, px, py, planet.size * 3);
      glowGrad.addColorStop(0, `rgba(${planet.color.r}, ${planet.color.g}, ${planet.color.b}, 0.4)`);
      glowGrad.addColorStop(1, `rgba(${planet.color.r}, ${planet.color.g}, ${planet.color.b}, 0)`);
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(px, py, planet.size * 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = `rgba(${planet.color.r}, ${planet.color.g}, ${planet.color.b}, 0.9)`;
      ctx.beginPath();
      ctx.arc(px, py, planet.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Nucleo
    const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.12);
    coreGrad.addColorStop(0, `rgba(${Math.floor(pal.spiralR+40)}, ${Math.floor(pal.spiralG+80)}, ${Math.floor(pal.spiralB+20)}, 0.6)`);
    coreGrad.addColorStop(0.5, `rgba(${Math.floor(pal.spiralR*0.8)}, ${Math.floor(pal.spiralG*0.7)}, ${Math.floor(pal.spiralB*0.9)}, 0.3)`);
    coreGrad.addColorStop(1, `rgba(${Math.floor(pal.spiralR*0.5)}, ${Math.floor(pal.spiralG*0.4)}, ${Math.floor(pal.spiralB*0.6)}, 0)`);
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.12, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Bordo
    const borderPulse = 0.6 + 0.4 * Math.sin(t * 0.8);
    const outerGlow = ctx.createRadialGradient(cx, cy, R * 0.95, cx, cy, R * 1.15);
    outerGlow.addColorStop(0, `rgba(${Math.floor(pal.spiralR*0.5)}, ${Math.floor(pal.spiralG*0.4)}, ${Math.floor(pal.spiralB*0.6)}, ${0.15 * borderPulse})`);
    outerGlow.addColorStop(0.5, `rgba(${Math.floor(pal.spiralR*0.3)}, ${Math.floor(pal.spiralG*0.2)}, ${Math.floor(pal.spiralB*0.4)}, ${0.08 * borderPulse})`);
    outerGlow.addColorStop(1, `rgba(${Math.floor(pal.r2)}, ${Math.floor(pal.g2)}, ${Math.floor(pal.b2)}, 0)`);
    ctx.fillStyle = outerGlow;
    ctx.beginPath();
    ctx.arc(cx, cy, R * 1.15, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = `rgba(${Math.floor(pal.spiralR*0.6)}, ${Math.floor(pal.spiralG*0.5)}, ${Math.floor(pal.spiralB*0.7)}, ${0.4 * borderPulse})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = `rgba(${Math.floor(pal.spiralR*0.4)}, ${Math.floor(pal.spiralG*0.3)}, ${Math.floor(pal.spiralB*0.5)}, ${0.25 * borderPulse})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, R - 3, 0, Math.PI * 2);
    ctx.stroke();

    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
