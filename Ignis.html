<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Orbis - Ignis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  canvas { display: block; }
</style>
<base target="_blank">
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const DURATION = 30;
  let startTime = null;

  function getTime() {
    if (!startTime) startTime = performance.now();
    return ((performance.now() - startTime) / 1000) % DURATION;
  }

  // FIAMME cerchio
  const flames = [];
  for (let i = 0; i < 200; i++) {
    const r = Math.pow(Math.random(), 0.7);
    flames.push({
      baseR: r,
      baseAngle: Math.random() * Math.PI * 2,
      size: 4 + Math.random() * 12,
      trembleSpeed: 3 + Math.random() * 8,
      tremblePhase: Math.random() * Math.PI * 2,
      driftSpeed: 0.2 + Math.random() * 0.6,
      driftPhase: Math.random() * Math.PI * 2,
      colorSpeed: 5 + Math.random() * 10,
      colorPhase: Math.random() * Math.PI * 2,
      brightness: 0.5 + Math.random() * 0.5,
      lifeSpeed: 2 + Math.random() * 5,
      lifePhase: Math.random() * Math.PI * 2,
    });
  }

  // SCINTILLE
  const sparks = [];
  for (let i = 0; i < 80; i++) {
    const r = Math.pow(Math.random(), 0.8);
    sparks.push({
      baseR: r,
      baseAngle: Math.random() * Math.PI * 2,
      size: 1 + Math.random() * 3,
      speed: 4 + Math.random() * 12,
      phase: Math.random() * Math.PI * 2,
      jumpiness: 0.5 + Math.random() * 1.5,
      brightness: 0.6 + Math.random() * 0.4,
    });
  }

  // BRACI
  const embers = [];
  for (let i = 0; i < 60; i++) {
    embers.push({
      baseR: Math.random() * 0.35,
      baseAngle: Math.random() * Math.PI * 2,
      size: 2 + Math.random() * 5,
      pulseSpeed: 1 + Math.random() * 3,
      phase: Math.random() * Math.PI * 2,
      brightness: 0.3 + Math.random() * 0.4,
    });
  }

  function getFireColor(t, speed, phase, brightness) {
    const norm = ((t * speed + phase) / (Math.PI * 2) + 1000) % 1;
    let r, g, b;
    if (norm < 0.2) { r=255; g=240; b=50; }
    else if (norm < 0.35) { r=255; g=140; b=10; }
    else if (norm < 0.5) { r=255; g=80; b=5; }
    else if (norm < 0.65) { r=255; g=180; b=20; }
    else if (norm < 0.8) { r=255; g=200; b=40; }
    else { r=255; g=220; b=120; }
    const flicker = 0.7 + 0.3 * Math.sin(t * 20 + phase * 7);
    return {
      r: Math.floor(r * brightness * flicker),
      g: Math.floor(g * brightness * flicker),
      b: Math.floor(b * brightness * flicker),
      a: brightness * flicker
    };
  }

  function draw() {
    const t = getTime();
    const w = canvas.width;
    const h = canvas.height;
    const cx = w / 2;
    const cy = h / 2;
    const R = Math.min(w, h) * 0.42;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.clip();

    // Sfondo caldo
    const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
    bg.addColorStop(0, 'rgba(40,10,0,0.9)');
    bg.addColorStop(0.3, 'rgba(25,6,0,0.7)');
    bg.addColorStop(0.7, 'rgba(12,3,0,0.5)');
    bg.addColorStop(1, 'rgba(5,1,0,0.8)');
    ctx.fillStyle = bg;
    ctx.fillRect(cx-R, cy-R, R*2, R*2);

    // Braci
    embers.forEach(e => {
      const pulse = Math.sin((t/DURATION)*e.pulseSpeed*Math.PI*2 + e.phase);
      const life = 0.5 + 0.5 * pulse;
      const ex = cx + Math.cos(e.baseAngle) * e.baseR * R * 0.6;
      const ey = cy + Math.sin(e.baseAngle) * e.baseR * R * 0.6;
      ctx.fillStyle = 'rgba('+Math.floor(180+life*75)+','+Math.floor(30+life*40)+','+Math.floor(life*15)+','+((0.3+life*0.3)*e.brightness)+')';
      ctx.beginPath();
      ctx.arc(ex, ey, e.size*(0.6+0.4*life), 0, Math.PI*2);
      ctx.fill();
    });

    // FIAMME - ritmo irregolare con combinazione di sinusoidi
    flames.forEach(f => {
      const da = f.baseAngle + Math.sin((t/DURATION)*f.driftSpeed*Math.PI*2+f.driftPhase)*0.3;
      const dr = Math.max(0, Math.min(1, f.baseR + Math.sin((t/DURATION)*f.driftSpeed*1.3*Math.PI*2+f.driftPhase+1)*0.08));
      // Ritmo irregolare: combinazione di 3 frequenze incommensurabili
      const tremble = (
        Math.sin(t * f.trembleSpeed + f.tremblePhase) * 0.5 +
        Math.sin(t * f.trembleSpeed * 1.618 + f.tremblePhase * 2.3) * 0.3 +
        Math.sin(t * f.trembleSpeed * 2.718 + f.tremblePhase * 3.7) * 0.2
      ) * 0.03 * R;
      const fx = cx + Math.cos(da)*dr*R + tremble*Math.cos(f.tremblePhase*3);
      const fy = cy + Math.sin(da)*dr*R + tremble*Math.sin(f.tremblePhase*3);
      // Vita irregolare
      const lifePulse = (
        Math.sin((t/DURATION)*f.lifeSpeed*Math.PI*2+f.lifePhase) * 0.6 +
        Math.sin((t/DURATION)*f.lifeSpeed*1.414*Math.PI*2+f.lifePhase*1.7) * 0.4
      );
      const life = 0.4 + 0.6 * (lifePulse*0.5+0.5);
      const col = getFireColor(t, f.colorSpeed, f.colorPhase, f.brightness*life);
      // Flicker irregolare
      const flickerSz = (
        Math.sin(t*f.trembleSpeed*2+f.tremblePhase) * 0.5 +
        Math.sin(t*f.trembleSpeed*3.33+f.tremblePhase*1.9) * 0.3 +
        Math.sin(t*f.trembleSpeed*5.55+f.tremblePhase*2.7) * 0.2
      ) * 0.5 + 0.5;
      const sz = f.size * life * (0.5 + 0.5 * flickerSz);
      ctx.fillStyle = 'rgba('+col.r+','+col.g+','+col.b+','+(col.a*0.8)+')';
      ctx.beginPath();
      ctx.arc(fx, fy, sz, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowColor = 'rgba('+col.r+','+Math.floor(col.g*0.6)+','+col.b+','+(col.a*0.4)+')';
      ctx.shadowBlur = sz*1.5;
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    // SCINTILLE - ritmo irregolare
    sparks.forEach(s => {
      const sp = (t/DURATION)*s.speed*Math.PI*2 + s.phase;
      const jr = Math.max(0, Math.min(1, s.baseR + (
        Math.sin(sp*s.jumpiness) * 0.6 +
        Math.sin(sp*s.jumpiness*1.732) * 0.4
      ) * 0.1));
      const ja = s.baseAngle + (
        Math.sin(sp*s.jumpiness*1.7) * 0.6 +
        Math.sin(sp*s.jumpiness*2.618) * 0.4
      ) * 0.2;
      const sx = cx + Math.cos(ja)*jr*R;
      const sy = cy + Math.sin(ja)*jr*R;
      // Flicker irregolare
      const flicker = (
        Math.sin(t*15+s.phase*11) * 0.5 +
        Math.sin(t*23+s.phase*17) * 0.3 +
        Math.sin(t*37+s.phase*29) * 0.2
      ) > 0 ? 1 : 0.3;
      const ba = s.brightness * flicker;
      const isHot = (
        Math.sin(t*s.speed*3+s.phase) * 0.6 +
        Math.sin(t*s.speed*5.1+s.phase*2.3) * 0.4
      ) > 0;
      const sg = isHot ? 250 : 200;
      const sb = isHot ? 150 : 50;
      ctx.fillStyle = 'rgba(255,'+sg+','+sb+','+ba+')';
      ctx.beginPath();
      ctx.arc(sx, sy, s.size*flicker, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowColor = 'rgba(255,200,50,'+(ba*0.6)+')';
      ctx.shadowBlur = s.size*3;
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    ctx.restore();

    // Bordo - ritmo irregolare
    const bf = 0.6 + 0.4 * (
      Math.sin(t*8) * Math.sin(t*13) * 0.5 +
      Math.sin(t*5.7) * Math.sin(t*11.3) * 0.3 +
      Math.sin(t*17.9) * 0.2
    );
    const og = ctx.createRadialGradient(cx, cy, R*0.95, cx, cy, R*1.2);
    og.addColorStop(0, 'rgba(255,100,10,'+(0.25*bf)+')');
    og.addColorStop(0.5, 'rgba(255,60,5,'+(0.1*bf)+')');
    og.addColorStop(1, 'rgba(255,30,0,0)');
    ctx.fillStyle = og;
    ctx.beginPath();
    ctx.arc(cx, cy, R*1.2, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,120,20,'+(0.5*bf)+')';
    ctx.lineWidth = 2+bf*2;
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,80,10,'+(0.3*bf)+')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, R-3, 0, Math.PI*2);
    ctx.stroke();
    requestAnimationFrame(draw);
  }

  draw();

  // ===== AUDIO =====
  let audioCtx = null;
  let masterGain = null;
  let isPlaying = false;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);
    isPlaying = true;
    startFireCrackle();
  }

  // Crepitio del fuoco: rumore bianco con burst casuali
  function startFireCrackle() {
    // Rumore di fondo basso (fiamma continua)
    const bufferSize = 2 * audioCtx.sampleRate;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.3;
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    noise.loop = true;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 600;
    filter.Q.value = 0.3;

    const gain = audioCtx.createGain();
    gain.gain.value = 0.03;

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    noise.start();

    // Burst di crepitio - meno frequenti, toni vari
    function playCrackle() {
      if (!isPlaying) return;
      const burstCount = 1 + Math.floor(Math.random() * 2);
      for (let b = 0; b < burstCount; b++) {
        setTimeout(() => {
          if (!isPlaying) return;
          const dur = 0.015 + Math.random() * 0.04;
          const bufSize = Math.floor(audioCtx.sampleRate * dur);
          const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) {
            d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
          }
          const src = audioCtx.createBufferSource();
          src.buffer = buf;

          const bp = audioCtx.createBiquadFilter();
          bp.type = 'bandpass';
          // Frequenze variabili: alcuni gravi (800-2000), altri acuti (2500-5000)
          const isDeep = Math.random() > 0.6;
          bp.frequency.value = isDeep ? (800 + Math.random() * 1200) : (2500 + Math.random() * 2500);
          bp.Q.value = isDeep ? 1.2 : 0.7;

          const g = audioCtx.createGain();
          g.gain.value = isDeep ? (0.06 + Math.random() * 0.06) : (0.04 + Math.random() * 0.05);

          src.connect(bp);
          bp.connect(g);
          g.connect(masterGain);
          src.start();
        }, b * (40 + Math.random() * 80));
      }
      setTimeout(playCrackle, 200 + Math.random() * 600);
    }
    setTimeout(playCrackle, 500);
  }

  function startAudio() {
    if (!audioCtx) {
      initAudio();
    } else if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }
  document.addEventListener('click', startAudio, { once: true });
  document.addEventListener('touchstart', startAudio, { once: true });
  document.addEventListener('pointerdown', startAudio, { once: true });
</script>

<!-- Audio activation overlay -->
<div id="audio-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,0.6);z-index:1000;cursor:pointer;transition:opacity 0.5s;">
  <div style="color:#fff;font-family:sans-serif;font-size:1.2rem;letter-spacing:2px;text-align:center;">
    <div style="font-size:2rem;margin-bottom:10px;">🔊</div>
    Tap to enable audio
  </div>
</div>
<script>
  (function() {
    const overlay = document.getElementById('audio-overlay');
    function hideOverlay() {
      overlay.style.opacity = '0';
      setTimeout(() => overlay.style.display = 'none', 500);
    }
    overlay.addEventListener('click', hideOverlay);
    overlay.addEventListener('touchstart', hideOverlay);
  })();
</script>
</body>
</html>
