<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Orbis - Aura</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  canvas {
    display: block;
  }
</style>
<base target="_blank">
</head>
<body>
<canvas id="c"></canvas>
<script>

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => canvas.width;
  const H = () => canvas.height;
  const CX = () => canvas.width / 2;
  const CY = () => canvas.height / 2;
  const BASE_RADIUS = () => Math.min(canvas.width, canvas.height) * 0.42;
  const DURATION = 30;

  // Three overlapping circles with soft blending
  const PARTICLES = 120;
  const particles = [];
  for (let i = 0; i < PARTICLES; i++) {
    particles.push({
      angle: Math.random() * Math.PI * 2,
      dist: Math.random(),
      size: 2 + Math.random() * 4,
      speed: 0.3 + Math.random() * 0.5,
      phase: Math.random() * Math.PI * 2,
      opacityPhase: Math.random() * Math.PI * 2
    });
  }

  function getPalette(t) {
    const cycle = (t / DURATION) % 1;
    const hue1 = (cycle * 360) % 360;
    const hue2 = (hue1 + 120) % 360;
    const hue3 = (hue1 + 240) % 360;
    return [hue1, hue2, hue3];
  }

  function hsl(h, s, l) {
    return `hsl(${h}, ${s}%, ${l}%)`;
  }

  function draw() {
    const t = (performance.now() / 1000) % DURATION;
    const cx = CX(), cy = CY(), r = BASE_RADIUS();
    const [h1, h2, h3] = getPalette(t);

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W(), H());

    // Three soft circles
    const offsets = [
      { dx: -r * 0.35, dy: -r * 0.2, hue: h1 },
      { dx: r * 0.35, dy: -r * 0.2, hue: h2 },
      { dx: 0, dy: r * 0.4, hue: h3 }
    ];

    for (const off of offsets) {
      const grd = ctx.createRadialGradient(
        cx + off.dx, cy + off.dy, 0,
        cx + off.dx, cy + off.dy, r * 0.9
      );
      grd.addColorStop(0, hsl(off.hue, 90, 55));
      grd.addColorStop(0.5, hsl(off.hue, 80, 45));
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(cx + off.dx, cy + off.dy, r * 0.9, 0, Math.PI * 2);
      ctx.fill();
    }

    // Particles
    for (const p of particles) {
      const pt = (t * p.speed + p.phase) % (Math.PI * 2);
      const rad = p.dist * r * 0.85;
      const px = cx + Math.cos(p.angle + pt * 0.1) * rad;
      const py = cy + Math.sin(p.angle + pt * 0.1) * rad;
      const op = 0.3 + 0.7 * Math.sin(t * 2 + p.opacityPhase);
      ctx.fillStyle = `rgba(255,255,255,${op * 0.6})`;
      ctx.beginPath();
      ctx.arc(px, py, p.size, 0, Math.PI * 2);
      ctx.fill();
    }

    // Main circle border with glow
    const pulse = 1 + 0.03 * Math.sin((t / DURATION) * 2 * Math.PI * 2);

    // Border glow
    const glow = 10 + 5 * Math.sin((t / DURATION) * Math.PI * 2);
    ctx.shadowColor = hsl(h1, 80, 60);
    ctx.shadowBlur = glow;
    ctx.strokeStyle = hsl(h1, 70, 70);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy, r * pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
